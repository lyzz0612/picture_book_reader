name: picture_book_reader
description: 绘本阅读 App - 文字版 / 绘本版双模式
publish_to: 'none'

# version: 语义化版本 + 构建号
# 语义版本（0.1.0）手动维护，发大版本时 bump。
# 构建号 CI 不读这里的值——GitHub Actions 用 github.run_number 通过
# `flutter build --build-number` 覆盖，保证每次 CI 产物构建号唯一递增，
# App 端 PackageInfo 反映 CI 构建号，据此判断是否需要更新。
# 这里的 +1 仅作本地默认（本地直接 flutter run/build 时使用）。
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  path_provider: ^2.1.0
  crypto: ^3.0.3
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/books/index.json
    - assets/books/book_001/
    - assets/books/book_003/
    - assets/books/book_004/
    - assets/books/book_005/
    - assets/books/book_006/
    - assets/books/book_007/
    - assets/books/book_008/
    - assets/books/book_009/
    - assets/books/book_010/
    - assets/books/book_011/
    - assets/books/book_012/
    - assets/books/book_013/
    - assets/books/book_014/
    - assets/books/book_015/
    - assets/books/book_016/
    - assets/books/book_017/
    - assets/books/book_018/
    - assets/books/book_019/
    - assets/books/book_020/
    - assets/books/book_021/
    - assets/books/book_022/
    - assets/books/book_023/
